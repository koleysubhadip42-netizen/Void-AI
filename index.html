<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void AI | Next-Gen Eraser</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #112244 0%, #050505 80%);
            min-height: 100 screen;
        }

        .cyber-title {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px rgba(0, 243, 255, 0.5);
        }

        .glass-card {
            background: rgba(15, 15, 22, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .neon-btn {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: black;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            filter: brightness(1.2);
        }

        .neon-btn:active { transform: translateY(0); }

        #outputCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            /* Pro-level checkered background */
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 16px 16px;
            display: block;
        }

        .loader-ring {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-radius: 50%;
            border-top-color: var(--neon-blue);
            border-bottom-color: var(--neon-purple);
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .upload-area:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.03);
        }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12">

    <header class="text-center mb-12">
        <h1 class="cyber-title text-4xl md:text-5xl font-extrabold text-cyan-400">VOID AI</h1>
        <div class="h-1 w-24 bg-cyan-500 mx-auto mt-4 rounded-full blur-[1px]"></div>
    </header>

    <main class="w-full max-w-2xl space-y-8">
        
        <div class="upload-area glass-card rounded-3xl p-12 text-center border-dashed border-2 border-cyan-500/20 cursor-pointer">
            <input type="file" id="imageInput" accept="image/*" class="hidden">
            <label for="imageInput" class="cursor-pointer block">
                <div class="flex justify-center mb-6">
                    <div class="p-4 bg-cyan-500/10 rounded-full">
                        <svg class="w-12 h-12 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                    </div>
                </div>
                <h3 class="text-xl font-semibold text-white mb-2">Initialize Core Image</h3>
                <p class="text-slate-500 text-sm tracking-wide">Select image to strip background</p>
            </label>
        </div>

        <div class="flex gap-4">
            <button id="processBtn" disabled class="neon-btn flex-1 py-5 rounded-2xl disabled:opacity-20 disabled:cursor-not-allowed">
                START NEURAL CUT 🪄
            </button>
            <button id="downloadBtn" class="hidden bg-slate-800 hover:bg-slate-700 text-white px-8 rounded-2xl transition-all border border-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
        </div>

        <div id="status" class="text-center text-[10px] font-mono text-cyan-400/50 uppercase tracking-[0.4em] h-4"></div>

        <div class="relative glass-card rounded-3xl p-3 min-h-[350px] flex items-center justify-center overflow-hidden border-white/5">
            <div id="loader" class="hidden absolute z-30 flex flex-col items-center">
                <div class="loader-ring"></div>
                <span class="mt-4 text-xs tracking-tighter text-cyan-400 animate-pulse">ANALYZING PIXELS...</span>
            </div>
            <canvas id="outputCanvas"></canvas>
            <div id="placeholder" class="text-slate-800 font-black uppercase text-4xl opacity-20 select-none">VOID_PREVIEW</div>
        </div>

    </main>

    <img id="hiddenImg" class="hidden">

    <script>
        const imageInput = document.getElementById('imageInput');
        const hiddenImg = document.getElementById('hiddenImg');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');

        // Initialize High-Accuracy Model
        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });

        selfieSegmentation.setOptions({ modelSelection: 0 }); // 0 = High Accuracy

        selfieSegmentation.onResults((results) => {
            outputCanvas.width = results.image.width;
            outputCanvas.height = results.image.height;

            ctx.save();
            ctx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);

            // Create sharpened offscreen mask
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = outputCanvas.width;
            tempCanvas.height = outputCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            // Sharpen logic from Code 2 (Removes all ghosting)
            tempCtx.filter = 'contrast(350%) brightness(110%)'; 
            tempCtx.drawImage(results.segmentationMask, 0, 0, tempCanvas.width, tempCanvas.height);

            // Draw final result
            ctx.drawImage(results.image, 0, 0, outputCanvas.width, outputCanvas.height);
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(tempCanvas, 0, 0);

            ctx.restore();
            
            loader.classList.add('hidden');
            status.innerText = ">> SYSTEM: CUT SUCCESSFUL";
            downloadBtn.classList.remove('hidden');
            processBtn.disabled = false;
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                hiddenImg.src = event.target.result;
                hiddenImg.onload = () => {
                    placeholder.classList.add('hidden');
                    outputCanvas.width = hiddenImg.width;
                    outputCanvas.height = hiddenImg.height;
                    ctx.drawImage(hiddenImg, 0, 0);
                    processBtn.disabled = false;
                    status.innerText = ">> STATUS: IMAGE_BUFFERED";
                };
            };
            reader.readAsDataURL(file);
        });

        processBtn.addEventListener('click', async () => {
            status.innerText = ">> ENGINE: SEGMENTING...";
            loader.classList.remove('hidden');
            processBtn.disabled = true;
            await selfieSegmentation.send({ image: hiddenImg });
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `VOID_AI_${Date.now()}.png`;
            link.href = outputCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
