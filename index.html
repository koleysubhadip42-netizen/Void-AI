            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void AI | Pro Cut</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #112244 0%, #050505 80%);
        }

        .cyber-title {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue);
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        .neon-btn {
            background: linear-gradient(45deg, #0082ad, #00f3ff);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            transition: all 0.3s ease;
        }

        .neon-btn:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.02);
        }

        #outputCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
        }

        .loader {
            border: 3px solid rgba(0, 243, 255, 0.1);
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="text-center mb-10 mt-10">
        <h1 class="cyber-title text-4xl font-bold text-cyan-400 uppercase tracking-widest">VOID AI</h1>
    </header>

    <main class="w-full max-w-xl space-y-6">
        
        <div class="glass-card rounded-2xl p-10 text-center border-dashed border-2 border-cyan-400/30">
            <input type="file" id="imageInput" accept="image/*" class="hidden">
            <label for="imageInput" class="cursor-pointer group">
                <div class="flex justify-center mb-4">
                    <svg class="w-14 h-14 text-cyan-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <span class="text-cyan-400 font-bold tracking-widest uppercase text-sm">SELECT CORE IMAGE</span>
            </label>
        </div>

        <div class="flex gap-4">
            <button id="processBtn" disabled class="neon-btn flex-1 text-black font-extrabold py-4 rounded-xl disabled:opacity-20 disabled:cursor-not-allowed uppercase tracking-wider">
                START NEURAL CUT 🪄
            </button>
            <button id="downloadBtn" class="hidden bg-white/10 hover:bg-white/20 text-white px-8 rounded-xl transition-all">
                📥
            </button>
        </div>

        <div id="status" class="text-center text-[10px] font-mono text-cyan-500/60 h-4 uppercase tracking-[0.2em]"></div>

        <div class="relative glass-card rounded-2xl p-2 min-h-[300px] flex items-center justify-center overflow-hidden">
            <div id="loader" class="hidden absolute z-20">
                <div class="loader"></div>
            </div>
            <canvas id="outputCanvas"></canvas>
            <div id="placeholder" class="text-slate-800 font-bold uppercase text-sm tracking-widest">RESULT_PREVIEW</div>
        </div>

    </main>

    <img id="hiddenImg" class="hidden">

    <script>
        const imageInput = document.getElementById('imageInput');
        const hiddenImg = document.getElementById('hiddenImg');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');

        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });

        // Forced high accuracy model
        selfieSegmentation.setOptions({ modelSelection: 0 });

        selfieSegmentation.onResults((results) => {
            outputCanvas.width = results.image.width;
            outputCanvas.height = results.image.height;
            
            ctx.save();
            ctx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
            
            // Mask sharpening logic
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = outputCanvas.width;
            tempCanvas.height = outputCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            // INCREASE CONTRAST: This removes the "gray" fuzzy edges (ghosting)
            tempCtx.filter = 'contrast(400%) brightness(100%)'; 
            tempCtx.drawImage(results.segmentationMask, 0, 0, tempCanvas.width, tempCanvas.height);

            // Use source-in to keep only the parts of the image that match the sharpened mask
            ctx.drawImage(tempCanvas, 0, 0); // Draw mask first
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0); 
            
            ctx.restore();
            
            loader.classList.add('hidden');
            status.innerText = "CUT_SUCCESSFUL";
            downloadBtn.classList.remove('hidden');
            processBtn.disabled = false;
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                hiddenImg.src = event.target.result;
                hiddenImg.onload = () => {
                    placeholder.classList.add('hidden');
                    outputCanvas.width = hiddenImg.width;
                    outputCanvas.height = hiddenImg.height;
                    ctx.drawImage(hiddenImg, 0, 0);
                    processBtn.disabled = false;
                    status.innerText = "BUFFERED";
                };
            };
            reader.readAsDataURL(file);
        });

        processBtn.addEventListener('click', async () => {
            status.innerText = "PROCESSING PIXELS...";
            loader.classList.remove('hidden');
            processBtn.disabled = true;
            await selfieSegmentation.send({ image: hiddenImg });
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `VoidAI_Cutout.png`;
            link.href = outputCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
